<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0b0f1a;
            --bg-secondary: #111827;
            --bg-tertiary: #1a2236;
            --bg-card: #151d2e;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.1);
            --accent-glow: rgba(56, 189, 248, 0.2);
            --success: #34d399;
            --warning: #fbbf24;
            --error: #f87171;
            --border: #1e293b;
            --sql-bg: #0d1117;
            --user-bg: #162033;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-width: 960px;
            margin: 0 auto;
        }

        /* ── Header ──────────────────────────────── */
        .header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: var(--bg-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-text h1 { font-size: 17px; font-weight: 700; }
        .header-text span { font-size: 11px; color: var(--text-muted); }

        .connection-badge {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 20px;
            font-size: 11px; color: var(--success);
        }
        .connection-badge .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ── Chat Area ───────────────────────────── */
        .chat-area {
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .welcome h2 {
            font-size: 22px; color: var(--text-primary);
            margin-bottom: 8px;
        }
        .welcome p { font-size: 14px; max-width: 460px; margin: 0 auto 20px; line-height: 1.6; }

        .examples {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; max-width: 600px; margin: 0 auto;
        }
        .example-btn {
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .example-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ── Messages ────────────────────────────── */
        .msg { display: flex; flex-direction: column; gap: 8px; }
        .msg.user .bubble {
            background: var(--user-bg);
            border: 1px solid #1e3050;
            border-radius: 16px 16px 4px 16px;
            padding: 12px 16px;
            align-self: flex-end;
            max-width: 80%;
            font-size: 14px;
        }
        .msg.assistant .bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
            padding: 14px 18px;
            max-width: 95%;
            font-size: 14px;
            line-height: 1.6;
        }

        /* SQL Preview */
        .sql-block {
            background: var(--sql-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        .sql-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--text-muted);
        }
        .sql-header button {
            background: none; border: none; color: var(--accent);
            cursor: pointer; font-size: 11px; padding: 2px 6px;
        }
        .sql-code {
            padding: 10px 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: #93c5fd;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Data Table */
        .data-table-wrapper {
            overflow-x: auto;
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table th {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            position: sticky; top: 0;
        }
        .data-table td {
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* Chart Container */
        .chart-container {
            margin-top: 10px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 300px;
        }
        .chart-container canvas { max-height: 260px; }

        /* Meta Info */
        .meta-info {
            display: flex; gap: 12px; margin-top: 6px;
            font-size: 11px; color: var(--text-muted);
        }
        .meta-info span { display: flex; align-items: center; gap: 3px; }

        /* Follow-ups */
        .follow-ups {
            display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
        }
        .follow-up-btn {
            padding: 6px 12px;
            background: var(--accent-dim);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            color: var(--accent);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .follow-up-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--accent);
        }

        /* Loading */
        .loading {
            display: flex; align-items: center; gap: 8px;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .loading-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce {
            0%,80%,100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Single number display */
        .number-display {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            padding: 20px;
            margin-top: 8px;
        }

        /* ── Input Area ──────────────────────────── */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-primary);
        }
        .input-row {
            display: flex; gap: 10px;
            max-width: 100%;
        }
        .input-row textarea {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        .input-row textarea:focus { border-color: var(--accent); }
        .input-row textarea::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            color: var(--bg-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #60cdfa; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .input-hint {
            font-size: 11px; color: var(--text-muted);
            margin-top: 6px; text-align: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">DP</div>
            <div class="header-text">
                <h1>DataPilot</h1>
                <span>Ask anything about your data</span>
            </div>
            <div class="connection-badge" id="connBadge">
                <div class="dot"></div>
                <span id="connText">Connecting...</span>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <h2>Ask your data anything</h2>
                <p>DataPilot connects to your Azure SQL database and answers questions in plain English. No SQL knowledge needed.</p>
                <div class="examples" id="examples"></div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="input" rows="1" placeholder="Ask a question about your data..." autofocus></textarea>
                <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
            </div>
            <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let conversationHistory = [];
        let chartInstance = null;

        const exampleQuestions = [
            "What were total sales last month?",
            "Top 10 customers by revenue",
            "Show average order value by region",
            "How many orders were placed this year?",
            "What's the month-over-month growth rate?",
            "Which products have the highest return rate?",
        ];

        // ── Initialize ──────────────────────────────
        async function init() {
            // Render example buttons
            const el = document.getElementById('examples');
            exampleQuestions.forEach(q => {
                const btn = document.createElement('button');
                btn.className = 'example-btn';
                btn.textContent = q;
                btn.onclick = () => {
                    document.getElementById('input').value = q;
                    send();
                };
                el.appendChild(btn);
            });

            // Check health
            try {
                const res = await fetch(`${API}/api/health`);
                const data = await res.json();
                const badge = document.getElementById('connBadge');
                const text = document.getElementById('connText');
                if (data.status === 'healthy') {
                    const src = (data.source || '').toUpperCase();
                    text.textContent = `${src} · ${data.schema?.tables || 0} tables`;
                } else {
                    badge.style.borderColor = 'rgba(251, 191, 36, 0.3)';
                    badge.style.background = 'rgba(251, 191, 36, 0.1)';
                    text.textContent = 'Degraded';
                    text.style.color = 'var(--warning)';
                }
            } catch {
                const text = document.getElementById('connText');
                text.textContent = 'Disconnected';
                text.style.color = 'var(--error)';
            }
        }

        // ── Send Message ────────────────────────────
        async function send() {
            const input = document.getElementById('input');
            const question = input.value.trim();
            if (!question) return;

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;

            // Hide welcome
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';

            // Add user message
            addMessage('user', question);
            showLoading();

            try {
                const res = await fetch(`${API}/api/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        conversation_history: conversationHistory.slice(-10),
                        session_id: 'default',
                    }),
                });

                removeLoading();

                if (!res.ok) {
                    const err = await res.json();
                    addAssistantMessage({
                        answer: `Error: ${err.detail || 'Something went wrong'}`,
                        sql: '', data: null, chart_type: 'none',
                        follow_ups: [], execution_time_ms: 0, row_count: 0,
                    });
                    return;
                }

                const data = await res.json();
                addAssistantMessage(data);

                // Update conversation history
                conversationHistory.push({ role: 'user', content: question });
                conversationHistory.push({
                    role: 'assistant',
                    content: data.answer,
                    sql: data.sql,
                });

            } catch (err) {
                removeLoading();
                addAssistantMessage({
                    answer: `Connection error: ${err.message}`,
                    sql: '', data: null, chart_type: 'none',
                    follow_ups: [], execution_time_ms: 0, row_count: 0,
                });
            } finally {
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // ── Render Messages ─────────────────────────
        function addMessage(role, text) {
            const area = document.getElementById('chatArea');
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;
            msg.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            area.appendChild(msg);
            area.scrollTop = area.scrollHeight;
        }

        function addAssistantMessage(data) {
            const area = document.getElementById('chatArea');
            const msg = document.createElement('div');
            msg.className = 'msg assistant';

            let html = `<div class="bubble">${formatAnswer(data.answer)}`;

            // SQL Preview
            if (data.sql) {
                html += `
                    <div class="sql-block">
                        <div class="sql-header">
                            <span>SQL Query</span>
                            <button onclick="copySQL(this)">Copy</button>
                        </div>
                        <div class="sql-code">${escapeHtml(data.sql)}</div>
                    </div>`;
            }

            // Data visualization
            if (data.data && data.data.rows && data.data.rows.length > 0) {
                const chartId = 'chart_' + Date.now();

                if (data.chart_type === 'number' && data.data.rows.length === 1 && data.data.columns.length === 1) {
                    const val = data.data.rows[0][data.data.columns[0]];
                    html += `<div class="number-display">${formatNumber(val)}</div>`;
                } else if (['bar', 'line', 'pie', 'area'].includes(data.chart_type) && data.data.rows.length <= 30) {
                    html += `<div class="chart-container"><canvas id="${chartId}"></canvas></div>`;
                }

                // Always show table (collapsible for large datasets)
                if (data.data.rows.length > 0) {
                    html += renderTable(data.data.columns, data.data.rows);
                }
            }

            // Meta info
            html += `<div class="meta-info">`;
            if (data.source) html += `<span>🔌 ${data.source}</span>`;
            if (data.execution_time_ms) html += `<span>⚡ ${data.execution_time_ms.toFixed(0)}ms</span>`;
            if (data.row_count) html += `<span>📊 ${data.row_count.toLocaleString()} rows</span>`;
            if (data.cached) html += `<span>💾 cached</span>`;
            html += `</div>`;

            // Follow-ups
            if (data.follow_ups && data.follow_ups.length > 0) {
                html += `<div class="follow-ups">`;
                data.follow_ups.forEach(q => {
                    html += `<button class="follow-up-btn" onclick="askFollowUp('${escapeAttr(q)}')">${escapeHtml(q)}</button>`;
                });
                html += `</div>`;
            }

            html += `</div>`;
            msg.innerHTML = html;
            area.appendChild(msg);
            area.scrollTop = area.scrollHeight;

            // Render chart if applicable
            if (data.data && data.data.rows && data.data.rows.length > 0 && data.data.rows.length <= 30) {
                const chartId = msg.querySelector('canvas')?.id;
                if (chartId) {
                    setTimeout(() => renderChart(chartId, data.chart_type, data.data), 100);
                }
            }
        }

        function renderTable(columns, rows, maxRows = 50) {
            let html = `<div class="data-table-wrapper"><table class="data-table"><thead><tr>`;
            columns.forEach(c => { html += `<th>${escapeHtml(c)}</th>`; });
            html += `</tr></thead><tbody>`;
            rows.slice(0, maxRows).forEach(row => {
                html += `<tr>`;
                columns.forEach(c => {
                    const val = row[c];
                    html += `<td>${val === null ? '<span style="color:var(--text-muted)">NULL</span>' : escapeHtml(String(val))}</td>`;
                });
                html += `</tr>`;
            });
            if (rows.length > maxRows) {
                html += `<tr><td colspan="${columns.length}" style="text-align:center;color:var(--text-muted)">... ${rows.length - maxRows} more rows</td></tr>`;
            }
            html += `</tbody></table></div>`;
            return html;
        }

        function renderChart(canvasId, type, data) {
            const canvas = document.getElementById(canvasId);
            if (!canvas || !data.rows || data.rows.length === 0) return;

            const cols = data.columns;
            if (cols.length < 2) return;

            const labels = data.rows.map(r => String(r[cols[0]]));
            const values = data.rows.map(r => parseFloat(r[cols[1]]) || 0);

            const colors = [
                '#38bdf8', '#818cf8', '#34d399', '#fbbf24', '#f87171',
                '#a78bfa', '#22d3ee', '#fb923c', '#e879f9', '#4ade80',
            ];

            const chartType = type === 'area' ? 'line' : (type === 'pie' ? 'doughnut' : type);

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(canvas, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        label: cols[1],
                        data: values,
                        backgroundColor: chartType === 'doughnut' ? colors : 'rgba(56, 189, 248, 0.3)',
                        borderColor: chartType === 'doughnut' ? colors : '#38bdf8',
                        borderWidth: chartType === 'doughnut' ? 0 : 2,
                        fill: type === 'area',
                        tension: 0.3,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: chartType === 'doughnut', labels: { color: '#94a3b8' } },
                    },
                    scales: chartType === 'doughnut' ? {} : {
                        x: { ticks: { color: '#64748b', maxRotation: 45 }, grid: { color: 'rgba(255,255,255,0.04)' } },
                        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.04)' } },
                    },
                },
            });
        }

        // ── Helpers ─────────────────────────────────
        function showLoading() {
            const area = document.getElementById('chatArea');
            const el = document.createElement('div');
            el.id = 'loading';
            el.className = 'loading';
            el.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div> Querying your data...`;
            area.appendChild(el);
            area.scrollTop = area.scrollHeight;
        }

        function removeLoading() {
            const el = document.getElementById('loading');
            if (el) el.remove();
        }

        function askFollowUp(q) {
            document.getElementById('input').value = q;
            send();
        }

        function copySQL(btn) {
            const code = btn.closest('.sql-block').querySelector('.sql-code').textContent;
            navigator.clipboard.writeText(code);
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        }

        function formatAnswer(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function formatNumber(val) {
            if (val === null || val === undefined) return 'N/A';
            const num = parseFloat(val);
            if (isNaN(num)) return String(val);
            if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (Math.abs(num) >= 1e3) return num.toLocaleString();
            return num % 1 === 0 ? num.toString() : num.toFixed(2);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function escapeAttr(s) {
            return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // ── Keyboard ────────────────────────────────
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        // Auto-resize textarea
        document.getElementById('input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        init();
    </script>
</body>
</html>
